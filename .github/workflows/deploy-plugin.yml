name: Deploy TRMNL Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'TRMNLPlugins/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install trmnlp from source
        run: |
          git clone https://github.com/usetrmnl/trmnlp.git /tmp/trmnlp
          cd /tmp/trmnlp
          gem build *.gemspec
          gem install *.gem

      - name: Push plugin to TRMNL
        working-directory: ./TRMNLPlugins
        env:
          TRMNL_API_KEY: ${{ secrets.TRMNL_API_KEY }}
        run: trmnlp push
