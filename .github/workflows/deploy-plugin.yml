name: Deploy TRMNL Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'TRMNLPlugins/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Install trmnlp
        run: gem install trmnl_preview

      - name: Debug - list plugin files
        working-directory: ./TRMNLPlugins
        run: find . -type f | sort
        
      - name: Push plugin to TRMNL
        working-directory: ./TRMNLPlugins
        env:
          TRMNL_API_KEY: ${{ secrets.TRMNL_API_KEY }}
        run: trmnlp push
